apiVersion: v1
kind: Service
metadata:
  name: {{ include "shard-proxy.fullname" . }}
  labels:
    {{- include "shard-proxy.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "shard-proxy.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
